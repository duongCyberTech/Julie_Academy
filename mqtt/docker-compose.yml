version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: julie
      RABBITMQ_DEFAULT_VHOST: julie_dev_vhost
    ports:
      - "5672:5672"     # Cổng gửi tin nhắn
      - "15672:15672"   # Cổng UI quản lý
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_net

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: always
    command: redis-server --appendonly yes --requirepass 123456

  tutor-service:
    build:
      context: ../tutor-service
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env.docker.local
    container_name: tutor-app
    depends_on:
      - redis
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    ports:
      - "4000:4000"
    # volumes:
    #   - .:/usr/src/app 
    command: npx nest start --watch --preserveWatchOutput
    restart: always

  adaptive-service:
    build:
      context: ../adaptive-learning-service
      dockerfile: Dockerfile
      # target: builder
    env_file:
      - .env
    container_name: adaptive-app
    depends_on:
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=dev
      - RABBITMQ_PASSWORD=julie
      - RABBITMQ_VHOST=julie_dev_vhost
    ports:
      - "8000:8000"
    # volumes:
    #   - .:/usr/src/app 
    restart: always

volumes:
  rabbitmq_data:

networks:
  rabbitmq_net:
    driver: bridge