version: 2.1

orbs:
  node: circleci/node@5.0.0

parameters:
  run-tutor-service:
    type: boolean
    default: false
  run-frontend: # KHAI BÁO THÊM BIẾN CHO FRONTEND
    type: boolean
    default: false

jobs:
  # --- JOB 1: CHẠY CI ---
  build-and-test-backend:
    docker:
      - image: cimg/node:22.14.0
    working_directory: ~/project/tutor-service
    steps:
      - checkout:
          path: ~/project
      - node/install-packages:
          pkg-manager: npm
          app-dir: ~/project/tutor-service
      - run:
          name: Generate Prisma Client
          command: npx prisma generate
      # - run:
      #     name: Chạy Linter
      #     command: npm run lint
      - run:
          name: Chạy Unit Tests
          command: npm run test
      - run:
          name: Build ứng dụng NestJS
          command: npm run build

  deploy-to-ec2:
    # Dùng machine image thay vì docker image để thực thi các tác vụ mạng/SSH mượt hơn
    machine:
      image: ubuntu-2204:current
    steps:
      # 1. Nạp chìa khóa vào môi trường chạy của CircleCI
      - add_ssh_keys:
          fingerprints:
            - "SHA256:sBgr9p4HkKeDCbd+R7BpTu7P4V6S5HJbF/IdprWl2U0"
            
      # 2. Lưu IP của EC2 vào danh sách an toàn để lệnh SSH không bị chặn bởi câu hỏi "Are you sure you want to continue connecting (yes/no)?"
      - run:
          name: Bypass strict host checking
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      # 3. Đăng nhập và thực thi chuỗi lệnh Deploy
      - run:
          name: Deploy to EC2
          command: |
            ssh $EC2_USERNAME@$EC2_HOST \
            "cd Julie_Academy && \
             git pull origin main && \
             docker compose up -d --build"

  # --- JOB MỚI CHO FRONTEND (REACT) ---
  build-and-test-frontend:
      docker:
        # React cũng có thể dùng chung môi trường Node 22
        - image: cimg/node:22.14.0 
      working_directory: ~/project/frontend
      steps:
        - checkout:
            path: ~/project
        - node/install-packages:
            pkg-manager: npm
            app-dir: ~/project/frontend
        # - run:
        #     name: Chạy Linter (React)
        #     command: npm run lint
        # Bỏ comment nếu dự án React của bạn có cấu hình Jest/Vitest
        # - run:
        #     name: Chạy Unit Tests
        #     command: npm run test
        - run:
            name: Build ứng dụng React
            command: npm run build

  deploy-frontend-to-vercel:
      docker:
        - image: cimg/base:current
      steps:
        - run:
            name: Trigger Vercel Deploy
            command: curl -X POST $REACT_VERCEL_DEPLOY

workflows:
  nest-ci-cd-workflow:
    when: << pipeline.parameters.run-tutor-service >>
    jobs:
      - build-and-test-backend:
          filters:
            branches:
              # CI sẽ chạy trên mọi nhánh để test code
              only: /.*/ 
              
      - deploy-to-ec2:
          # Điều kiện 1: Bắt buộc job build-and-test phải Xanh (Pass) mới được chạy
          requires:
            - build-and-test-backend
          # Điều kiện 2: CHỈ kích hoạt deploy khi code nằm trên nhánh main
          filters:
            branches:
              only: 
                - main

  # --- WORKFLOW FRONTEND (MỚI) ---
  react-ci-workflow:
    # CHỈ chạy workflow này nếu thư mục frontend có thay đổi
    when: << pipeline.parameters.run-frontend >> 
    jobs:
      - build-and-test-frontend:
          filters:
            branches:
              only: /.*/

      - deploy-frontend-to-vercel:
          requires:
            - build-and-test-frontend
          filters:
            branches:
              only: 
                - main