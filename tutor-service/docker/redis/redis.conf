# --- KẾT NỐI & BẢO MẬT ---
# Chấp nhận kết nối từ mọi IP bên trong mạng Docker
bind 0.0.0.0
port 6379

# Đặt mật khẩu cho Redis (Thay 'your_strong_password' bằng mật khẩu của bạn)
requirepass '123456'

# --- LƯU TRỮ DỮ LIỆU (PERSISTENCE) ---
# Tự động lưu snapshot (RDB) sau 900 giây nếu có ít nhất 1 thay đổi
save 900 1
save 300 10
save 60 10000

# Bật chế độ Append Only File (AOF) để tránh mất dữ liệu khi crash
appendonly yes
appendfilename "appendonly.aof"
# Ghi dữ liệu xuống ổ cứng mỗi giây (cân bằng nhất)
appendfsync everysec

# --- QUẢN LÝ BỘ NHỚ ---
# Giới hạn RAM tối đa (ví dụ 512mb hoặc 1gb tùy máy bạn)
maxmemory 512mb
# Khi đầy RAM, xóa các key ít được sử dụng nhất (LRU)
maxmemory-policy allkeys-lru

# --- HIỆU NĂNG ---
# Tắt bảo vệ nếu bạn đã đặt mật khẩu và bind đúng
protected-mode yes