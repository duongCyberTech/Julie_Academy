version: '3.8'
services:
  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: always
    command: redis-server --appendonly yes --requirepass 123456

  tutor-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker.local
    container_name: tutor-app
    depends_on:
      - redis
    environment:
      # Kết nối tới Redis bằng tên service thay vì localhost
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    ports:
      - "4000:4000"
    restart: always

volumes:
  redis_data: